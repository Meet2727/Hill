<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Temple Runner 3D Template</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            background: #000;
        }
        /* UI Overlay */
        #ui-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }
        .hud-text {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-family: monospace;
        }
        /* Screen Overlays */
        .screen {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 10;
        }
        .hidden { display: none !important; }
        h1 {
            font-size: 42px;
            color: #ffcc00;
            margin-bottom: 10px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        p {
            font-size: 18px;
            margin-bottom: 20px;
            color: #ccc;
            text-align: center;
            max-width: 80%;
        }
        button {
            pointer-events: auto;
            background: #ffcc00;
            color: #111;
            border: none;
            padding: 12px 35px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div id="scoreDisplay" class="hud-text">SCORE: 00000</div>
    </div>

    <div id="startScreen" class="screen">
        <h1>TEMPLE RUNNER</h1>
        <p>Desktop: Left/Right Arrows to lane shift. Up Arrow to Jump.<br>Mobile: Swipe Left, Right, or Up.</p>
        <button id="startBtn">RUN</button>
    </div>

    <div id="gameOverScreen" class="screen hidden">
        <h1 style="color: #ff3333;">CAUGHT!</h1>
        <p id="finalScoreText">Your Final Score: 0</p>
        <button id="restartBtn">RUN AGAIN</button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- CONSTANTS & CONFIG ---
const TARGET_WIDTH = 800;
const TARGET_HEIGHT = 600;
const LANE_WIDTH = 2.0;       // Arbitrary 3D units width
const CAMERA_DEPTH = 0.5;     // Distance from eye to screen pointer projection
const SEGMENT_LENGTH = 10;    // Depth length of an individual road block

let gameSpeed = 15;           // Speed of player movement down segments
const MAX_SPEED = 40;
let playerLane = 0;           // -1 = Left, 0 = Center, 1 = Right
let targetLaneX = 0;          // Current visual animation sliding target
let playerX = 0;              // Current smooth visual offset coordinate
let playerJumpY = 0;          // Dynamic jump physics trajectory height tracker
let jumpVelocity = 0;
const GRAVITY = 1.2;

let score = 0;
let gameState = 'MENU';       // MENU, PLAYING, GAMEOVER

let segments = [];
let obstacles = [];
let currentTrackLength = 0;

// --- INITIALIZE DIMENSIONS ---
function resizeCanvas() {
    const windowRatio = window.innerWidth / window.innerHeight;
    const targetRatio = TARGET_WIDTH / TARGET_HEIGHT;
    
    if (windowRatio < targetRatio) {
        canvas.width = window.innerWidth;
        canvas.height = window.innerWidth / targetRatio;
    } else {
        canvas.width = window.innerHeight * targetRatio;
        canvas.height = window.innerHeight;
    }
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// --- MAP & PROCEDURAL SYSTEM GENERATOR ---
function createSegment() {
    let type = 'STRAIGHT';
    if (segments.length > 20 && Math.random() < 0.2) {
        type = Math.random() > 0.5 ? 'CURVE_LEFT' : 'CURVE_RIGHT';
    }
    
    segments.push({
        index: segments.length,
        type: type,
        curve: type === 'CURVE_LEFT' ? -1.5 : (type === 'CURVE_RIGHT' ? 1.5 : 0)
    });
}

function spawnObstacle() {
    if (gameState !== 'PLAYING') return;
    const lanes = [-1, 0, 1];
    const randomLane = lanes[Math.floor(Math.random() * lanes.length)];
    
    obstacles.push({
        z: currentTrackLength + 400, // Distance units out ahead
        lane: randomLane,
        width: 0.8,
        height: 40
    });
}

// --- PERSPECTIVE 3D ENGINE MATH ---
function project3D(x, y, z, camX, camY, camZ) {
    const transX = x - camX;
    const transY = y - camY;
    const transZ = z - camZ;

    if (transZ <= 0) return null; // Behind camera clipping check

    const scale = CAMERA_DEPTH / transZ;
    return {
        x: (canvas.width / 2) + (scale * transX * canvas.width / 2),
        y: (canvas.height / 2) + (scale * transY * canvas.height / 2),
        w: scale * canvas.width
    };
}

// --- CONTROLS INPUT MANAGEMENT ---
window.addEventListener('keydown', (e) => {
    if (gameState !== 'PLAYING') return;
    if ((e.key === 'ArrowLeft' || e.key === 'a') && playerLane > -1) playerLane--;
    if ((e.key === 'ArrowRight' || e.key === 'd') && playerLane < 1) playerLane++;
    if ((e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') && playerJumpY === 0) {
        jumpVelocity = 18;
    }
});

// Mobile Touch Swipes Engine Logic
let touchStartX = 0;
let touchStartY = 0;
window.addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].screenX;
    touchStartY = e.changedTouches[0].screenY;
}, { passive: true });

window.addEventListener('touchend', e => {
    if (gameState !== 'PLAYING') return;
    const diffX = e.changedTouches[0].screenX - touchStartX;
    const diffY = e.changedTouches[0].screenY - touchStartY;

    if (Math.abs(diffX) > Math.abs(diffY)) {
        if (diffX > 40 && playerLane < 1) playerLane++;
        if (diffX < -40 && playerLane > -1) playerLane--;
    } else {
        if (diffY < -40 && playerJumpY === 0) jumpVelocity = 18;
    }
}, { passive: true });

// --- GAME LOOP MECHANICS ---
let positionZ = 0;

function update() {
    if (gameState !== 'PLAYING') return;

    // Linear speed progression loop
    positionZ += gameSpeed;
    currentTrackLength = positionZ;
    gameSpeed = Math.min(MAX_SPEED, gameSpeed + 0.003);
    score += Math.floor(gameSpeed / 10);
    document.getElementById('scoreDisplay').innerText = `SCORE: ${String(score).padStart(5, '0')}`;

    // Smooth lane changes visual interpolations
    targetLaneX = playerLane * LANE_WIDTH;
    playerX = (targetLaneX - playerX) * 0.25 + playerX;

    // Jump Physics integration loop
    if (playerJumpY > 0 || jumpVelocity > 0) {
        playerJumpY += jumpVelocity;
        jumpVelocity -= GRAVITY;
        if (playerJumpY <= 0) {
            playerJumpY = 0;
            jumpVelocity = 0;
        }
    }

    // Keep building endless road variations ahead dynamically
    while (segments.length < (positionZ / SEGMENT_LENGTH) + 60) {
        createSegment();
    }

    // Process obstacles & check hard collisions matrix updates
    for (let i = obstacles.length - 1; i >= 0; i--) {
        let obs = obstacles[i];
        
        // Dynamic structural overlap test
        if (Math.abs(obs.z - positionZ) < 12) {
            if (playerLane === obs.lane && playerJumpY < obs.height * 0.4) {
                // Collision structural strike! Game Over logic
                gameState = 'GAMEOVER';
                document.getElementById('finalScoreText').innerText = `Your Final Score: ${score}`;
                document.getElementById('gameOverScreen').classList.remove('hidden');
            }
        }
        // Garbage collection of old obstacles passed behind screen depth boundaries
        if (obs.z < positionZ - 50) {
            obstacles.splice(i, 1);
        }
    }
}

function render() {
    // Render environment sky / wall backdrops
    ctx.fillStyle = '#1a0d00';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const camX = playerX;
    const camY = -1.2 - playerJumpY * 0.01; // Height level relative offsets matrix
    const startSegmentIndex = Math.floor(positionZ / SEGMENT_LENGTH);

    let dx = 0; 
    let maxSegmentPerspectiveView = 45;

    // 1. Draw The 3D Track Environment Floor Layer Frame Loop Backward to avoid rendering overlap artifacts
    for (let n = maxSegmentPerspectiveView; n > 0; n--) {
        const segIndex = startSegmentIndex + n;
        if (segIndex >= segments.length) continue;
        const seg = segments[segIndex];

        dx += seg.curve * 0.05; // Track curvature distortion modifiers
        
        const z1 = segIndex * SEGMENT_LENGTH;
        const p1 = project3D(dx, 0, z1, camX, camY, positionZ);
        const p2 = project3D(dx + seg.curve * 0.05, 0, z1 + SEGMENT_LENGTH, camX, camY, positionZ);

        if (!p1 || !p2) continue;

        // Render alternating dark/light bricks styling
        ctx.fillStyle = (segIndex % 2 === 0) ? '#4a3621' : '#3d2b19';
        
        ctx.beginPath();
        ctx.moveTo(p1.x - p1.w * (LANE_WIDTH * 1.5), p1.y);
        ctx.lineTo(p1.x + p1.w * (LANE_WIDTH * 1.5), p1.y);
        ctx.lineTo(p2.x + p2.w * (LANE_WIDTH * 1.5), p2.y);
        ctx.lineTo(p2.x - p2.w * (LANE_WIDTH * 1.5), p2.y);
        ctx.fill();

        // Lane Separator Lines indicators
        ctx.strokeStyle = 'rgba(255,204,0,0.2)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(p1.x - p1.w * (LANE_WIDTH / 2), p1.y);
        ctx.lineTo(p2.x - p2.w * (LANE_WIDTH / 2), p2.y);
        ctx.moveTo(p1.x + p1.w * (LANE_WIDTH / 2), p1.y);
        ctx.lineTo(p2.x + p2.w * (LANE_WIDTH / 2), p2.y);
        ctx.stroke();
    }

    // 2. Render Obstacles projection layers safely
    for (let obs of obstacles) {
        let screenPos = project3D(obs.lane * LANE_WIDTH, 0, obs.z, camX, camY, positionZ);
        if (!screenPos) continue;

        let w = screenPos.w * obs.width;
        let h = screenPos.w * 0.4; // Scaled projection depth height metric bounding box
        
        ctx.fillStyle = '#ff3333';
        ctx.strokeStyle = '#990000';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.roundRect(screenPos.x - w / 2, screenPos.y - h, w, h, 5);
        ctx.fill();
        ctx.stroke();
    }

    // 3. Render Player Avatar Mesh bounding shapes representation layers
    const playerScreenY = canvas.height - 80;
    ctx.fillStyle = '#00ccff';
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#00ccff';
    
    ctx.beginPath();
    // Visualizing size scales and responsive configurations
    let runningHeightOffset = playerJumpY * (canvas.height / TARGET_HEIGHT);
    ctx.arc(canvas.width / 2, playerScreenY - runningHeightOffset, 20, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0; // Clear state canvas loops context parameters safety
}

function runLoop() {
    update();
    render();
    requestAnimationFrame(runLoop);
}

// --- INITIALIZATION START TRIGGERS ---
function initNewGame() {
    segments = [];
    obstacles = [];
    positionZ = 0;
    playerLane = 0;
    playerX = 0;
    playerJumpY = 0;
    jumpVelocity = 0;
    gameSpeed = 15;
    score = 0;
    
    for(let i=0; i<50; i++) createSegment(); // Prebuild initial runway track layers safely
}

// Spawner loops
setInterval(spawnObstacle, 1500);

$('startBtn').addEventListener('click', () => {
    initNewGame();
    gameState = 'PLAYING';
    document.getElementById('startScreen').classList.add('hidden');
});

$('restartBtn').addEventListener('click', () => {
    initNewGame();
    gameState = 'PLAYING';
    document.getElementById('gameOverScreen').classList.add('hidden');
});

// Start loop sequence ticking
runLoop();

function $(id) { return document.getElementById(id); }
</script>

</body>
</html>
